<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Panel Estudiante</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">

        <h4 class="text-white text-center mb-4">Estudiante</h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link" href="#">🏠 Inicio</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">📚 Mis Cursos</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">📖 Materias</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">🧾 Matrículas</a>
            </li>
             <li class="nav-item">
                <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>
            </li>

        </ul>

    </div>

    <!-- CONTENIDO -->
    <div class="content flex-grow-1">

        <!-- NAVBAR -->
        <nav class="navbar navbar-light bg-light shadow-sm px-4">
            <span class="navbar-brand">
                Bienvenido, <b th:text="${usuario.usuarioNick}"></b>
            </span>
        </nav>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="container mt-4">

            <h3>Mi Panel Académico</h3>
            <p>Consulta tu información académica.</p>

            <div class="row mt-4">

                <!-- CURSOS -->
                <div class="col-md-4">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <h5>Mis Cursos</h5>
                            <p>Total: <span th:text="${totalCursos}">0</span></p>
                            <a href="#" class="btn btn-primary btn-sm">Ver cursos</a>
                        </div>
                    </div>
                </div>

                <!-- MATERIAS -->
                <div class="col-md-4">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <h5>Materias</h5>
                            <p>Total: <span th:text="${totalMaterias}">0</span></p>
                            <a href="#" class="btn btn-success btn-sm">Ver materias</a>
                        </div>
                    </div>
                </div>

                <!-- MATRICULAS -->
                <div class="col-md-4">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <h5>Matrículas</h5>
                            <p>Total: <span th:text="${totalMatriculas}">0</span></p>
                            <a href="#" class="btn btn-warning btn-sm">Ver matrículas</a>
                        </div>
                    </div>
                </div>

            </div>

            <!-- TABLA DE MATRICULAS -->
            <div class="mt-5">
                <h4>Mis Matrículas</h4>

                <table class="table table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>Curso</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${matriculas}">
                            <td th:text="${m.curso.nombre}"></td>
                            <td th:text="${m.matriculaFecha}"></td>
                            <td th:text="${m.matriculaEstado}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </div>

</div>

</body>
</html>
