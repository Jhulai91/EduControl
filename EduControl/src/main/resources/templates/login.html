<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">

    

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body class="d-flex justify-content-center align-items-center">

    <div class="container">
        <div class="row justify-content-center">
            
            <div class="col-11 col-sm-8 col-md-5 col-lg-4">
                
                <div class="card login-card p-4">
                    
                    <h3 class="text-center mb-4">Iniciar Sesión</h3>

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label class="form-label text-center w-100">Usuario</label>
                            <input type="text" class="form-control" name="usuarioNick" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-center w-100">Contraseña</label>
                            <input type="password" class="form-control" name="usuarioPassword" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-custom">
                                Ingresar
                            </button>
                        </div>
                        
                        

                    </form>

                    <!-- Error -->
                    <div th:if="${error}" class="alert alert-danger mt-3 text-center">
                        Credenciales incorrectas
                    </div>

                </div>

            </div>

        </div>
    </div>

</body>
</html>
