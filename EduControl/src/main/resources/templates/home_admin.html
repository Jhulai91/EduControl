<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Tu CSS -->
<link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">

        <h4 class="text-white text-center mb-4">EduControl</h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link" href="#">🏠 Inicio</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/usuario/listar">👤 Usuarios</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">🎓 Estudiantes</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">📚 Cursos</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">🧾 Matrículas</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/vistadocente/listar}">👨‍🏫 Docentes</a>
            </li>
            
             <li class="nav-item">
                <a class="nav-link" th:href="@{/vistaperiodo/listar}">Periodo</a>
            </li>
            
             <li class="nav-item">
                <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>
            </li>

        </ul>

    </div>

    <!-- CONTENIDO -->
    <div class="content flex-grow-1">

        <!-- NAVBAR -->
        <nav class="navbar navbar-light bg-light shadow-sm px-4">
            <span class="navbar-brand">
                Bienvenido, <b th:text="${usuario.usuarioNick}"></b>
            </span>
        </nav>

        <!-- CONTENIDO PRINCIPAL -->
        <div class="container mt-4">

            <h3>Panel de Administración</h3>
            <p>Selecciona una opción del menú lateral.</p>

            <!-- CARDS -->
            <div class="row mt-4">

                <div class="col-md-3">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <h5>Usuarios</h5>
                            <a href="/usuario/listar" class="btn btn-primary btn-sm">Ver</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <h5>Estudiantes</h5>
                            <a href="#" class="btn btn-success btn-sm">Ver</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <h5>Matrículas</h5>
                            <a href="#" class="btn btn-warning btn-sm">Ver</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card dashboard-card text-center">
                        <div class="card-body">
                            <h5>Docentes</h5>
                            <a href="#" class="btn btn-info btn-sm">Ver</a>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
