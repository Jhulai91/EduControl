<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="d-flex">

        <ul class="nav flex-column">

            </li>

            <li class="nav-item">
                <a class="nav-link" href="/usuario/listar">👤 Usuarios</a>

            <li class="nav-item">
                <a class="nav-link" href="/docente/listar">👨‍🏫 Docentes</a>

                <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>

        </ul>

    <!-- CONTENIDO -->
    <div class="content flex-grow-1">

        <nav class="navbar navbar-light bg-light shadow-sm px-4">
            <span class="navbar-brand">
                Bienvenido

        </nav>

        <!-- 🔥 CONTENIDO DINÁMICO -->
