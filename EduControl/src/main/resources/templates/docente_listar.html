<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Listado de Docentes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">

        <h4 class="text-white text-center mb-4">EduControl</h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link" href="#">🏠 Inicio</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/usuario/listar">👤 Usuarios</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">🎓 Estudiantes</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">📚 Cursos</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">🧾 Matrículas</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/vistadocente/listar}">👨‍🏫 Docentes</a>
            </li>
            
             <li class="nav-item">
                <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>
            </li>

        </ul>

    </div>



<div class="container mt-4">

    <h2 class="mb-4">Listado de Docentes</h2>

    <!-- BOTÓN NUEVO -->
    <a href="/vistadocente/nuevo" class="btn btn-primary mb-3">+ Nuevo Docente</a>

    <!-- TABLA -->
    <table class="table table-bordered table-hover">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Cédula</th>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Usuario</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="d : ${docentes}">
                <td th:text="${d.idDocente}"></td>
                <td th:text="${d.docenteCedula}"></td>
                <td th:text="${d.docenteNombres}"></td>
                <td th:text="${d.docenteApellidos}"></td>
                <td th:text="${d.docenteTelefono}"></td>
                <td th:text="${d.docenteEmail}"></td>

                <!-- Usuario -->
                <td th:text="${d.usuario.usuarioNick}"></td>

                <td th:text="${d.docenteEstado}"></td>

                <!-- ACCIONES -->
                <td>

                    <!-- EDITAR -->
                    <a th:href="@{/docente/editar/{id}(id=${d.idDocente})}" 
                       class="btn btn-warning btn-sm">Editar</a>

                    <!-- ELIMINAR -->
                    <a th:href="@{/vistadocente/eliminar/{id}(id=${d.idDocente})}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Eliminar docente?')">Eliminar</a>

                </td>
            </tr>
        </tbody>

    </table>
</div>
</div>

</body>
</html>
