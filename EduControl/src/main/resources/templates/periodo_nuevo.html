<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Periodo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">

        <h4 class="text-white text-center mb-4">EduControl</h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link" href="#">🏠 Inicio</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/usuario/listar">👤 Usuarios</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">🎓 Estudiantes</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">📚 Cursos</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">🧾 Matrículas</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/vistadocente/listar}">👨‍🏫 Docentes</a>
            </li>
            
             <li class="nav-item">
                <a href="/logout" class="btn btn-danger btn-sm">Cerrar sesión</a>
            </li>

        </ul>

    </div>

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registro de Periodo Académico</h4>
        </div>

        <div class="card-body">
            <form th:action="@{/vistaperiodo/guardar}" th:object="${periodo}" method="post">

                <!-- ID oculto -->
                <input type="hidden" th:field="*{idPeriodo}">

                <div class="row">

                    <!-- Nombre -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre del Periodo</label>
                        <input type="text" class="form-control"
                               th:field="*{periodoNombre}"
                               placeholder="Ej: 2025 - Semestre 1" required>
                    </div>

                    <!-- Estado -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Estado</label>
                        <select class="form-select" th:field="*{periodoEstado}">
                            <option value="ACTIVO">ACTIVO</option>
                            <option value="INACTIVO">INACTIVO</option>
                        </select>
                    </div>

                    <!-- Fecha Inicio -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha Inicio</label>
                        <input type="date" class="form-control"
                               th:field="*{periodoFechaInicio}" required>
                    </div>

                    <!-- Fecha Fin -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fecha Fin</label>
                        <input type="date" class="form-control"
                               th:field="*{periodoFechaFin}" required>
                    </div>

                </div>

                <!-- Botones -->
                <div class="mt-4 text-end">
                    <a th:href="@{/vistaperiodo/lista}" class="btn btn-secondary">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
</div>

</body>
</html>
